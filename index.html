<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Notes | Premium Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            /* Palette élégante : Olive, Beige clair, Blanc, Gris doux */
            --bg-color: #F5F3ED; /* Beige clair */
            --card-bg: #FFFFFF;
            --primary: #4A5D4E; /* Vert Olive */
            --primary-hover: #3A4A3D;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --success: #10B981;
            --error: #EF4444;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.06);
            --radius-md: 12px;
            --radius-lg: 20px;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- Header --- */
        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.02em;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 500;
            margin-top: 0.5rem;
        }

        /* --- Identity & Actions Section --- */
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: 2rem;
        }

        .identity-group {
            flex: 1;
            min-width: 250px;
        }

        .input-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-main);
            transition: var(--transition);
            background-color: #FAFAFA;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74, 93, 78, 0.1);
            background-color: #FFFFFF;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 93, 78, 0.2);
        }

        .btn-secondary {
            background-color: white;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-secondary:hover {
            background-color: var(--bg-color);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .btn-outline:hover {
            background-color: white;
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        /* --- Main Layout --- */
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 992px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* --- Cards --- */
        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .subject-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid transparent;
            transition: var(--transition);
        }

        .subject-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--border-color);
        }

        .subject-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .subject-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .coef-badge {
            background: var(--bg-color);
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .notes-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .notes-inputs.three-cols {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .notes-inputs input {
            text-align: center;
        }

        /* --- Results Section --- */
        .results-panel {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .general-avg-card {
            background: var(--primary);
            color: white;
            padding: 2rem;
            border-radius: var(--radius-md);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .general-avg-card::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            opacity: 0.5;
        }

        .avg-label {
            font-size: 1rem;
            font-weight: 500;
            opacity: 0.9;
            margin-bottom: 0.5rem;
        }

        .avg-value {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1;
        }

        .appraisal-badge {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        .subject-results {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background: var(--bg-color);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
        }

        .result-row span:last-child {
            font-weight: 700;
            color: var(--primary);
        }

        /* --- Toast Notifications --- */
        #toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 1000;
        }

        .toast {
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            background: white;
            box-shadow: var(--shadow-md);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateX(120%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--error); }
        
        /* Loading Overlay */
        #loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            visibility: hidden;
            opacity: 0;
            transition: var(--transition);
        }
        
        #loading.active {
            visibility: visible;
            opacity: 1;
        }

    </style>
</head>
<body>

    <div id="loading">Chargement...</div>
    <div id="toast-container"></div>

    <div class="container">
        <header>
            <h1>Gestion des notes</h1>
            <p>Semestre unique</p>
        </header>

        <div class="top-bar">
            <div class="identity-group input-group">
                <label for="nom_eleve">Nom complet de l'élève</label>
                <input type="text" id="nom_eleve" placeholder="Ex: Jean Dupont" required autocomplete="off">
            </div>
            <div class="action-buttons">
                <button type="button" class="btn-outline" onclick="resetForm()">Réinitialiser</button>
                <button type="button" class="btn-secondary" onclick="loadData()">Charger les données</button>
                <button type="button" class="btn-primary" onclick="calculateAndSave()">Calculer & Enregistrer</button>
            </div>
        </div>

        <div class="main-grid">
            <div>
                <h2 class="section-title">Saisie des notes (0 à 20)</h2>
                <div class="subjects-grid" id="subjects-container">
                    </div>
            </div>

            <div>
                <div class="results-panel">
                    <h2 class="section-title" style="margin-bottom: 0;">Résultats</h2>
                    
                    <div class="general-avg-card">
                        <div class="avg-label">Moyenne Générale Pondérée</div>
                        <div class="avg-value" id="moyenne-generale">--</div>
                        <div class="appraisal-badge" id="appraisal-badge" style="display: none;"></div>
                    </div>

                    <div class="subject-results" id="results-container">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Configuration Supabase ---
        const supabaseUrl = "https://exnrseyyxzqjhlabtesu.supabase.co";
        const supabaseKey = "sb_publishable_aAQhzHqknK1UKWRiLJur0w_E7jAXoDW";
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // --- Configuration des matières ---
        const subjectsConfig = [
            { id: 'math', name: 'Mathématiques', coef: 5, inputs: ['ctrl1', 'ctrl2', 'ctrl3'] },
            { id: 'francais', name: 'Français', coef: 5, inputs: ['note1', 'note2'] },
            { id: 'arabe', name: 'Arabe', coef: 5, inputs: ['note1', 'note2'] },
            { id: 'hg', name: 'Histoire-Géographie', coef: 3, inputs: ['note1', 'note2'] },
            { id: 'pc', name: 'Physique-Chimie', coef: 2, inputs: ['ctrl1', 'ctrl2', 'ctrl3'] },
            { id: 'is', name: 'IS', coef: 2, inputs: ['note1', 'note2'] },
            { id: 'anglais', name: 'Anglais', coef: 2, inputs: ['note1', 'note2'] },
            { id: 'eps', name: 'EPS', coef: 1, inputs: ['note1', 'note2'] },
            { id: 'informatique', name: 'Informatique', coef: 1, inputs: ['note1', 'note2'] }
        ];

        // --- Initialisation de l'interface ---
        function initUI() {
            const container = document.getElementById('subjects-container');
            const resultsContainer = document.getElementById('results-container');
            
            subjectsConfig.forEach(sub => {
                // Création des cartes de saisie
                const isThreeCols = sub.inputs.length === 3 ? 'three-cols' : '';
                const inputsHTML = sub.inputs.map((inp, idx) => `
                    <div class="input-group">
                        <label>${inp.includes('ctrl') ? 'Ctrl' : 'Note'} ${idx + 1}</label>
                        <input type="number" id="${sub.id}_${inp}" min="0" max="20" step="0.25" placeholder="-">
                    </div>
                `).join('');

                container.innerHTML += `
                    <div class="subject-card">
                        <div class="subject-header">
                            <h3>${sub.name}</h3>
                            <span class="coef-badge">Coef. ${sub.coef}</span>
                        </div>
                        <div class="notes-inputs ${isThreeCols}">
                            ${inputsHTML}
                        </div>
                    </div>
                `;

                // Création des lignes de résultat vides
                resultsContainer.innerHTML += `
                    <div class="result-row">
                        <span>${sub.name}</span>
                        <span id="res_${sub.id}">--</span>
                    </div>
                `;
            });
            
            // Écouteurs pour calcul automatique à la volée
            document.querySelectorAll('input[type="number"]').forEach(input => {
                input.addEventListener('input', runCalculationsOnly);
            });
        }

        // --- Logique de Calcul ---
        function runCalculationsOnly() {
            let totalPoints = 0;
            let totalCoefs = 0;
            let allValid = true;
            let results = {};

            subjectsConfig.forEach(sub => {
                let sum = 0;
                let count = 0;
                
                sub.inputs.forEach(inp => {
                    const val = document.getElementById(`${sub.id}_${inp}`).value;
                    if (val !== "") {
                        const num = parseFloat(val);
                        if (num >= 0 && num <= 20) {
                            sum += num;
                            count++;
                        } else {
                            allValid = false;
                        }
                    }
                });

                if (count === sub.inputs.length) {
                    const avg = sum / count;
                    results[sub.id] = avg;
                    document.getElementById(`res_${sub.id}`).innerText = avg.toFixed(2);
                    totalPoints += (avg * sub.coef);
                    totalCoefs += sub.coef;
                } else {
                    document.getElementById(`res_${sub.id}`).innerText = '--';
                }
            });

            const genAvgEl = document.getElementById('moyenne-generale');
            const badgeEl = document.getElementById('appraisal-badge');

            if (totalCoefs === 26) { // 26 est la somme totale exacte des coefs de cette configuration
                const genAvg = totalPoints / totalCoefs;
                genAvgEl.innerText = genAvg.toFixed(2);
                
                // Badge
                badgeEl.style.display = 'inline-block';
                if (genAvg >= 16) { badgeEl.innerText = 'Excellent'; badgeEl.style.color = '#fff'; }
                else if (genAvg >= 14) { badgeEl.innerText = 'Très bien'; badgeEl.style.color = '#fff'; }
                else if (genAvg >= 12) { badgeEl.innerText = 'Bien'; badgeEl.style.color = '#fff'; }
                else if (genAvg >= 10) { badgeEl.innerText = 'Passable'; badgeEl.style.color = '#fff'; }
                else { badgeEl.innerText = 'Insuffisant'; badgeEl.style.color = '#FFD1D1'; }
                
                return { isValid: allValid, isComplete: true, averages: results, general: genAvg };
            } else {
                genAvgEl.innerText = '--';
                badgeEl.style.display = 'none';
                return { isValid: allValid, isComplete: false };
            }
        }

        // --- Interaction avec Supabase ---
        async function calculateAndSave() {
            const nom_eleve = document.getElementById('nom_eleve').value.trim();
            if (!nom_eleve) {
                showToast("Le nom de l'élève est obligatoire.", "error");
                return;
            }

            const calc = runCalculationsOnly();

            if (!calc.isValid) {
                showToast("Veuillez vérifier que toutes les notes sont entre 0 et 20.", "error");
                return;
            }

            if (!calc.isComplete) {
                showToast("Veuillez remplir toutes les notes avant d'enregistrer.", "error");
                return;
            }

            // Préparation du payload
            const payload = { nom_eleve };
            
            // Ajouter les notes individuelles
            subjectsConfig.forEach(sub => {
                sub.inputs.forEach(inp => {
                    payload[`${sub.id}_${inp}`] = parseFloat(document.getElementById(`${sub.id}_${inp}`).value);
                });
                // Ajouter la moyenne de la matière
                payload[`moyenne_${sub.id}`] = parseFloat(calc.averages[sub.id].toFixed(2));
            });
            
            payload.moyenne_generale = parseFloat(calc.general.toFixed(2));

            toggleLoading(true);
            try {
                // Upsert : insère ou met à jour si le nom existe déjà
                const { error } = await supabase
                    .from('notes_semestre')
                    .upsert(payload, { onConflict: 'nom_eleve' });

                if (error) throw error;
                showToast("Notes calculées et enregistrées avec succès !", "success");
            } catch (err) {
                console.error(err);
                showToast("Erreur lors de l'enregistrement.", "error");
            } finally {
                toggleLoading(false);
            }
        }

        async function loadData() {
            const nom_eleve = document.getElementById('nom_eleve').value.trim();
            if (!nom_eleve) {
                showToast("Veuillez entrer un nom pour charger les données.", "error");
                return;
            }

            toggleLoading(true);
            try {
                const { data, error } = await supabase
                    .from('notes_semestre')
                    .select('*')
                    .eq('nom_eleve', nom_eleve)
                    .single();

                if (error) {
                    if (error.code === 'PGRST116') {
                        showToast("Aucun élève trouvé à ce nom.", "error");
                    } else {
                        throw error;
                    }
                    return;
                }

                // Remplissage du formulaire
                subjectsConfig.forEach(sub => {
                    sub.inputs.forEach(inp => {
                        const colName = `${sub.id}_${inp}`;
                        if (data[colName] !== null) {
                            document.getElementById(colName).value = data[colName];
                        }
                    });
                });

                runCalculationsOnly();
                showToast("Données chargées avec succès.", "success");

            } catch (err) {
                console.error(err);
                showToast("Erreur lors du chargement des données.", "error");
            } finally {
                toggleLoading(false);
            }
        }

        function resetForm() {
            document.querySelectorAll('input').forEach(input => input.value = '');
            runCalculationsOnly();
            showToast("Formulaire réinitialisé.", "success");
        }

        // --- Utilitaires ---
        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${message}</span>`;
            
            container.appendChild(toast);
            
            // Animation
            setTimeout(() => toast.classList.add('show'), 10);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        function toggleLoading(show) {
            const loader = document.getElementById('loading');
            if(show) loader.classList.add('active');
            else loader.classList.remove('active');
        }

        // Démarrage
        window.onload = initUI;

    </script>
</body>
</html>
