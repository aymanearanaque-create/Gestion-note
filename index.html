<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Massar Personnel | Espace Élève</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #F5F3ED; /* Beige clair */
            --card-bg: #FFFFFF;
            --primary: #4A5D4E; /* Vert Olive */
            --primary-hover: #3A4A3D;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --success: #10B981;
            --error: #EF4444;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.08);
            --radius-md: 12px;
            --radius-lg: 20px;
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
            width: 100%;
        }

        /* --- Visibilité des Sections (Correction de l'écran blanc) --- */
        #auth-section {
            display: flex; /* Visible par défaut */
            animation: fadeIn 0.5s ease;
        }
        
        #app-section {
            display: none; /* Masqué par défaut */
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Section Auth --- */
        .auth-wrapper {
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .auth-card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .auth-card h1 { color: var(--primary); font-size: 2rem; margin-bottom: 0.5rem; }
        .auth-card p { color: var(--text-muted); margin-bottom: 2rem; }
        .auth-form { display: flex; flex-direction: column; gap: 1.25rem; text-align: left; }
        .auth-buttons { display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem; }

        /* --- Inputs & Boutons --- */
        .input-group label { display: block; font-size: 0.875rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem; }
        .input-group input {
            width: 100%; padding: 0.85rem 1rem; border: 1px solid var(--border-color);
            border-radius: var(--radius-md); font-family: inherit; font-size: 1rem;
            transition: var(--transition); background-color: #FAFAFA;
        }
        .input-group input:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74, 93, 78, 0.1); background-color: #FFFFFF;
        }

        button {
            padding: 0.85rem 1.5rem; border: none; border-radius: var(--radius-md);
            font-family: inherit; font-weight: 600; font-size: 1rem; cursor: pointer;
            transition: var(--transition); display: flex; justify-content: center; align-items: center; width: 100%;
        }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(74, 93, 78, 0.2); }
        .btn-outline { background-color: transparent; color: var(--primary); border: 1px solid var(--primary); }
        .btn-outline:hover { background-color: var(--bg-color); }
        .btn-danger { background-color: transparent; color: var(--error); border: 1px solid var(--error); width: auto; padding: 0.5rem 1rem; font-size: 0.85rem; }
        .btn-danger:hover { background-color: #FEF2F2; }

        /* --- Dashboard Header --- */
        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2rem; background: var(--card-bg); padding: 1.5rem 2rem;
            border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); flex-wrap: wrap; gap: 1rem;
        }
        .user-info h2 { font-size: 1.5rem; color: var(--primary); }
        .user-info p { color: var(--text-muted); font-size: 0.95rem; font-weight: 500; }

        /* --- Layout Principal --- */
        .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
        @media (max-width: 992px) { .main-grid { grid-template-columns: 1fr; } }
        .section-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; }
        .top-bar-app { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; justify-content: space-between; align-items: flex-end; }

        /* --- Cartes Matières --- */
        .subjects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .subject-card { background: var(--card-bg); border-radius: var(--radius-lg); padding: 1.5rem; box-shadow: var(--shadow-sm); border: 1px solid transparent; transition: var(--transition); }
        .subject-card:hover { box-shadow: var(--shadow-md); border-color: var(--border-color); }
        .subject-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); }
        .subject-header h3 { font-size: 1.1rem; font-weight: 600; }
        .coef-badge { background: var(--bg-color); color: var(--primary); padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
        .notes-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .notes-inputs.three-cols { grid-template-columns: 1fr 1fr 1fr; }
        .notes-inputs input { text-align: center; }

        /* --- Panneau Résultats --- */
        .results-panel { background: var(--card-bg); border-radius: var(--radius-lg); padding: 2rem; box-shadow: var(--shadow-md); position: sticky; top: 2rem; }
        .general-avg-card { background: var(--primary); color: white; padding: 2rem; border-radius: var(--radius-md); text-align: center; margin-bottom: 1.5rem; }
        .avg-label { font-size: 1rem; font-weight: 500; opacity: 0.9; margin-bottom: 0.5rem; }
        .avg-value { font-size: 3.5rem; font-weight: 700; line-height: 1; }
        .appraisal-badge { display: inline-block; margin-top: 1rem; padding: 0.5rem 1.5rem; border-radius: 30px; font-weight: 700; font-size: 0.95rem; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px); }
        .result-row { display: flex; justify-content: space-between; padding: 0.75rem; background: var(--bg-color); border-radius: var(--radius-md); margin-bottom: 0.5rem; font-size: 0.95rem; }
        .result-row span:last-child { font-weight: 700; color: var(--primary); }

        /* --- Notifications & Loader --- */
        #toast-container { position: fixed; bottom: 2rem; right: 2rem; display: flex; flex-direction: column; gap: 1rem; z-index: 1000; }
        .toast { padding: 1rem 1.5rem; border-radius: var(--radius-md); background: white; box-shadow: var(--shadow-md); font-weight: 500; display: flex; gap: 0.75rem; transform: translateX(120%); opacity: 0; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--error); }
        
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); z-index: 2000; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; font-weight: 700; color: var(--primary); visibility: hidden; opacity: 0; transition: var(--transition); }
        #loading.active { visibility: visible; opacity: 1; }
    </style>
</head>
<body>

    <div id="loading">Veuillez patienter...</div>
    <div id="toast-container"></div>

    <div id="auth-section" class="container auth-wrapper">
        <div class="auth-card">
            <h1>Massar Personnel</h1>
            <p>Connectez-vous pour accéder à vos résultats</p>
            
            <div class="auth-form">
                <div class="input-group">
                    <label for="auth-email">Adresse e-mail</label>
                    <input type="email" id="auth-email" placeholder="eleve@ecole.com" required>
                </div>
                <div class="input-group">
                    <label for="auth-password">Mot de passe</label>
                    <input type="password" id="auth-password" placeholder="••••••••" required>
                </div>
                
                <div class="auth-buttons">
                    <button class="btn-primary" onclick="handleSignIn()">Se connecter</button>
                    <button class="btn-outline" onclick="handleSignUp()">Créer un compte</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app-section" class="container">
        
        <div class="app-header">
            <div class="user-info">
                <h2>Mon Bulletin</h2>
                <p id="welcome-message">Bienvenue</p>
            </div>
            <button class="btn-danger" onclick="handleSignOut()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Déconnexion
            </button>
        </div>

        <div class="top-bar-app">
            <div class="input-group" style="flex:1; max-width: 350px;">
                <label for="nom_eleve">Nom complet de l'élève</label>
                <input type="text" id="nom_eleve" placeholder="Ex: Jean Dupont">
            </div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn-outline" style="width:auto;" onclick="resetForm()">Effacer les notes</button>
                <button class="btn-primary" style="width:auto;" onclick="calculateAndSave()">Enregistrer les notes</button>
            </div>
        </div>

        <div class="main-grid">
            <div>
                <h2 class="section-title">Saisie des notes (0 à 20)</h2>
                <div class="subjects-grid" id="subjects-container"></div>
            </div>

            <div>
                <div class="results-panel">
                    <h2 class="section-title">Résultats</h2>
                    <div class="general-avg-card">
                        <div class="avg-label">Moyenne Générale Pondérée</div>
                        <div class="avg-value" id="moyenne-generale">--</div>
                        <div class="appraisal-badge" id="appraisal-badge" style="display: none;"></div>
                    </div>
                    <div id="results-container" style="display: flex; flex-direction: column; gap: 0.5rem;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Configuration Supabase ---
        const supabaseUrl = "https://exnrseyyxzqjhlabtesu.supabase.co";
        const supabaseKey = "sb_publishable_aAQhzHqknK1UKWRiLJur0w_E7jAXoDW";
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;

        // --- 2. Configuration des matières ---
        const subjectsConfig = [
            { id: 'math', name: 'Mathématiques', coef: 5, inputs: ['ctrl1', 'ctrl2', 'ctrl3'] },
            { id: 'francais', name: 'Français', coef: 5, inputs: ['note1', 'note2'] },
            { id: 'arabe', name: 'Arabe', coef: 5, inputs: ['note1', 'note2'] },
            { id: 'hg', name: 'Histoire-Géographie', coef: 3, inputs: ['note1', 'note2'] },
            { id: 'pc', name: 'Physique-Chimie', coef: 2, inputs: ['ctrl1', 'ctrl2', 'ctrl3'] },
            { id: 'is', name: 'IS', coef: 2, inputs: ['note1', 'note2'] },
            { id: 'anglais', name: 'Anglais', coef: 2, inputs: ['note1', 'note2'] },
            { id: 'eps', name: 'EPS', coef: 1, inputs: ['note1', 'note2'] },
            { id: 'informatique', name: 'Informatique', coef: 1, inputs: ['note1', 'note2'] }
        ];

        // --- 3. Initialisation Robuste de l'Application ---
        async function initApp() {
            try {
                initUI(); // Construit les formulaires
                
                // Vérifier la session actuelle au démarrage
                const { data: { session }, error } = await supabase.auth.getSession();
                if (error) throw error;

                if (session && session.user) {
                    currentUser = session.user;
                    showDashboard(currentUser.email);
                    loadUserData();
                } else {
                    showAuthScreen();
                }

                // Écouter les futurs changements (connexion/déconnexion)
                supabase.auth.onAuthStateChange((event, newSession) => {
                    if (newSession && newSession.user) {
                        currentUser = newSession.user;
                        showDashboard(currentUser.email);
                        loadUserData();
                    } else {
                        currentUser = null;
                        showAuthScreen();
                    }
                });
            } catch (err) {
                console.error("Erreur d'initialisation :", err);
                showAuthScreen(); // Sécurité : on affiche l'écran de connexion par défaut
            }
        }

        // --- 4. Fonctions d'Authentification ---
        async function handleSignUp() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return showToast("Veuillez remplir email et mot de passe", "error");

            toggleLoading(true);
            const { data, error } = await supabase.auth.signUp({ email, password });
            toggleLoading(false);

            if (error) showToast(error.message, "error");
            else showToast("Compte créé avec succès ! Vous pouvez vous connecter.", "success");
        }

        async function handleSignIn() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return showToast("Veuillez remplir email et mot de passe", "error");

            toggleLoading(true);
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            toggleLoading(false);

            if (error) showToast("Identifiants incorrects ou compte inexistant", "error");
            else showToast("Connexion réussie", "success");
        }

        async function handleSignOut() {
            toggleLoading(true);
            await supabase.auth.signOut();
            toggleLoading(false);
            resetForm();
            document.getElementById('nom_eleve').value = '';
            document.getElementById('auth-password').value = ''; // Vide le mot de passe
        }

        // --- 5. Gestion de l'Interface Visuelle ---
        function showAuthScreen() {
            document.getElementById('app-section').style.display = 'none';
            document.getElementById('auth-section').style.display = 'flex';
        }

        function showDashboard(email) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            document.getElementById('welcome-message').innerText = `Connecté en tant que : ${email}`;
        }

        function initUI() {
            const container = document.getElementById('subjects-container');
            const resultsContainer = document.getElementById('results-container');
            container.innerHTML = '';
            resultsContainer.innerHTML = '';
            
            subjectsConfig.forEach(sub => {
                const isThreeCols = sub.inputs.length === 3 ? 'three-cols' : '';
                const inputsHTML = sub.inputs.map((inp, idx) => `
                    <div class="input-group">
                        <label>${inp.includes('ctrl') ? 'Ctrl' : 'Note'} ${idx + 1}</label>
                        <input type="number" id="${sub.id}_${inp}" min="0" max="20" step="0.25" placeholder="-">
                    </div>
                `).join('');

                container.innerHTML += `
                    <div class="subject-card">
                        <div class="subject-header">
                            <h3>${sub.name}</h3>
                            <span class="coef-badge">Coef. ${sub.coef}</span>
                        </div>
                        <div class="notes-inputs ${isThreeCols}">${inputsHTML}</div>
                    </div>
                `;

                resultsContainer.innerHTML += `
                    <div class="result-row">
                        <span>${sub.name}</span>
                        <span id="res_${sub.id}">--</span>
                    </div>
                `;
            });
            
            // Écouteurs pour le calcul en temps réel
            document.querySelectorAll('input[type="number"]').forEach(input => {
                input.addEventListener('input', runCalculationsOnly);
            });
        }

        // --- 6. Logique Métier (Calculs & Base de données) ---
        function runCalculationsOnly() {
            let totalPoints = 0, totalCoefs = 0, allValid = true, results = {};

            subjectsConfig.forEach(sub => {
                let sum = 0, count = 0;
                sub.inputs.forEach(inp => {
                    const val = document.getElementById(`${sub.id}_${inp}`).value;
                    if (val !== "") {
                        const num = parseFloat(val);
                        if (num >= 0 && num <= 20) { sum += num; count++; } 
                        else { allValid = false; }
                    }
                });

                if (count === sub.inputs.length) {
                    const avg = sum / count;
                    results[sub.id] = avg;
                    document.getElementById(`res_${sub.id}`).innerText = avg.toFixed(2);
                    totalPoints += (avg * sub.coef);
                    totalCoefs += sub.coef;
                } else {
                    document.getElementById(`res_${sub.id}`).innerText = '--';
                }
            });

            const genAvgEl = document.getElementById('moyenne-generale');
            const badgeEl = document.getElementById('appraisal-badge');

            if (totalCoefs === 26) { // Somme de tous les coefficients
                const genAvg = totalPoints / totalCoefs;
                genAvgEl.innerText = genAvg.toFixed(2);
                badgeEl.style.display = 'inline-block';
                
                if (genAvg >= 16) { badgeEl.innerText = 'Excellent'; badgeEl.style.color = '#fff'; }
                else if (genAvg >= 14) { badgeEl.innerText = 'Très bien'; badgeEl.style.color = '#fff'; }
                else if (genAvg >= 12) { badgeEl.innerText = 'Bien'; badgeEl.style.color = '#fff'; }
                else if (genAvg >= 10) { badgeEl.innerText = 'Passable'; badgeEl.style.color = '#fff'; }
                else { badgeEl.innerText = 'Insuffisant'; badgeEl.style.color = '#FFD1D1'; }
                
                return { isValid: allValid, isComplete: true, averages: results, general: genAvg };
            } else {
                genAvgEl.innerText = '--';
                badgeEl.style.display = 'none';
                return { isValid: allValid, isComplete: false };
            }
        }

        async function calculateAndSave() {
            if (!currentUser) return showToast("Erreur : Vous devez être connecté.", "error");

            const nom_eleve = document.getElementById('nom_eleve').value.trim();
            if(!nom_eleve) return showToast("Le nom de l'élève est requis.", "error");

            const calc = runCalculationsOnly();
            if (!calc.isValid) return showToast("Toutes les notes doivent être entre 0 et 20.", "error");
            if (!calc.isComplete) return showToast("Veuillez remplir toutes les notes avant d'enregistrer.", "error");

            const payload = { 
                user_id: currentUser.id,
                nom_eleve: nom_eleve
            };
            
            subjectsConfig.forEach(sub => {
                sub.inputs.forEach(inp => {
                    payload[`${sub.id}_${inp}`] = parseFloat(document.getElementById(`${sub.id}_${inp}`).value);
                });
                payload[`moyenne_${sub.id}`] = parseFloat(calc.averages[sub.id].toFixed(2));
            });
            payload.moyenne_generale = parseFloat(calc.general.toFixed(2));

            toggleLoading(true);
            try {
                const { error } = await supabase
                    .from('notes_semestre')
                    .upsert(payload, { onConflict: 'user_id' }); // Met à jour les notes de CE user_id

                if (error) throw error;
                showToast("Notes sauvegardées dans votre espace !", "success");
            } catch (err) {
                console.error("Erreur de sauvegarde :", err);
                showToast("Erreur lors de la sauvegarde.", "error");
            } finally {
                toggleLoading(false);
            }
        }

        async function loadUserData() {
            if(!currentUser) return;
            toggleLoading(true);
            try {
                const { data, error } = await supabase
                    .from('notes_semestre')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .single();

                if (error && error.code !== 'PGRST116') throw error; // Ignorer si aucune donnée
                
                if (data) {
                    if(data.nom_eleve) document.getElementById('nom_eleve').value = data.nom_eleve;
                    subjectsConfig.forEach(sub => {
                        sub.inputs.forEach(inp => {
                            const colName = `${sub.id}_${inp}`;
                            if (data[colName] !== null) document.getElementById(colName).value = data[colName];
                        });
                    });
                    runCalculationsOnly(); // Met à jour les moyennes visuellement
                }
            } catch (err) {
                console.error("Erreur de chargement :", err);
                showToast("Erreur de récupération de vos données.", "error");
            } finally {
                toggleLoading(false);
            }
        }

        function resetForm() {
            document.querySelectorAll('.notes-inputs input').forEach(input => input.value = '');
            runCalculationsOnly();
        }

        // --- 7. Utilitaires UI ---
        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3000);
        }

        function toggleLoading(show) {
            const loader = document.getElementById('loading');
            if(show) loader.classList.add('active');
            else loader.classList.remove('active');
        }

        // Lancement au chargement de la page
        window.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
