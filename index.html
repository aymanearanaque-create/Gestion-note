<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Massar Personnel | Espace Élève</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #F5F3ED; 
            --card-bg: #FFFFFF;
            --primary: #4A5D4E; 
            --primary-hover: #3A4A3D;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --success: #10B981;
            --error: #EF4444;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.08);
            --radius-md: 12px;
            --radius-lg: 20px;
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; width: 100%; }

        /* --- Visibilité --- */
        #auth-section { display: flex; animation: fadeIn 0.5s ease; }
        #app-section { display: none; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Auth Section --- */
        .auth-wrapper { justify-content: center; align-items: center; min-height: 80vh; }
        .auth-card { background: var(--card-bg); padding: 3rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); width: 100%; max-width: 450px; text-align: center; }
        .auth-card h1 { color: var(--primary); font-size: 2rem; margin-bottom: 0.5rem; }
        .auth-card p { color: var(--text-muted); margin-bottom: 2rem; }
        .auth-form { display: flex; flex-direction: column; gap: 1.25rem; text-align: left; }
        .auth-buttons { display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem; }
        #auth-message { margin-top: 15px; font-weight: 600; font-size: 14px; text-align: center; }

        /* --- Inputs --- */
        .input-group { width: 100%; }
        .input-group label { display: block; font-size: 0.875rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem; }
        .input-group input { width: 100%; padding: 0.85rem 0.5rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit; font-size: 1rem; transition: var(--transition); background-color: #FAFAFA; text-align: center; }
        .input-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(74, 93, 78, 0.1); background-color: #FFFFFF; }

        button { padding: 0.85rem 1.5rem; border: none; border-radius: var(--radius-md); font-family: inherit; font-weight: 600; font-size: 1rem; cursor: pointer; transition: var(--transition); display: flex; justify-content: center; align-items: center; width: 100%; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(74, 93, 78, 0.2); }
        .btn-outline { background-color: transparent; color: var(--primary); border: 1px solid var(--primary); }
        .btn-outline:hover { background-color: var(--bg-color); }
        .btn-danger { background-color: transparent; color: var(--error); border: 1px solid var(--error); width: auto; padding: 0.5rem 1rem; font-size: 0.85rem; }
        .btn-danger:hover { background-color: #FEF2F2; }

        /* --- Dashboard --- */
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; background: var(--card-bg); padding: 1.5rem 2rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); flex-wrap: wrap; gap: 1rem; }
        .user-info h2 { font-size: 1.5rem; color: var(--primary); }
        .user-info p { color: var(--text-muted); font-size: 0.95rem; font-weight: 500; }
        
        .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
        .section-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center;}
        
        .top-bar-app { display: flex; gap: 1rem; margin-bottom: 2rem; justify-content: space-between; align-items: flex-end; }
        .top-bar-actions { display: flex; gap: 1rem; }

        /* --- Cartes Matières --- */
        .subjects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .subject-card { background: var(--card-bg); border-radius: var(--radius-lg); padding: 1.5rem; box-shadow: var(--shadow-sm); border: 1px solid transparent; transition: var(--transition); }
        .subject-card:hover { box-shadow: var(--shadow-md); border-color: var(--border-color); }
        .subject-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); }
        .subject-header h3 { font-size: 1.1rem; font-weight: 600; }
        .coef-badge { background: var(--bg-color); color: var(--primary); padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.8rem; font-weight: 700; white-space: nowrap; }
        
        .notes-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(60px, 1fr)); gap: 0.75rem; }

        /* --- Résultats --- */
        .results-panel { background: var(--card-bg); border-radius: var(--radius-lg); padding: 2rem; box-shadow: var(--shadow-md); position: sticky; top: 2rem; }
        .general-avg-card { background: var(--primary); color: white; padding: 2rem; border-radius: var(--radius-md); text-align: center; margin-bottom: 1.5rem; }
        .avg-label { font-size: 1rem; font-weight: 500; opacity: 0.9; margin-bottom: 0.5rem; }
        .avg-value { font-size: 3.5rem; font-weight: 700; line-height: 1; }
        .appraisal-badge { display: inline-block; margin-top: 1rem; padding: 0.5rem 1.5rem; border-radius: 30px; font-weight: 700; font-size: 0.95rem; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px); }
        .result-row { display: flex; justify-content: space-between; padding: 0.75rem; background: var(--bg-color); border-radius: var(--radius-md); margin-bottom: 0.5rem; font-size: 0.95rem; }
        .result-row span:last-child { font-weight: 700; color: var(--primary); }

        /* --- Modal de configuration --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 1500; display: none; justify-content: center; align-items: center; opacity: 0; transition: var(--transition); }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 600px; max-height: 90vh; border-radius: var(--radius-lg); padding: 2rem; overflow-y: auto; box-shadow: var(--shadow-md); transform: translateY(20px); transition: var(--transition); }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; }
        .modal-header h3 { font-size: 1.25rem; color: var(--primary); }
        .close-btn { background: none; border: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer; padding: 0; width: auto; }
        .modal-row { display: grid; grid-template-columns: 2fr 1fr auto; gap: 1rem; align-items: center; margin-bottom: 1rem; background: var(--bg-color); padding: 0.75rem; border-radius: var(--radius-md); }
        .modal-row input { padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 6px; text-align: center; }
        .modal-row input[type="text"] { text-align: left; }
        .btn-icon { background: var(--error); color: white; border-radius: 6px; width: 35px; height: 35px; padding: 0; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }

        /* --- Notifications & Loading --- */
        #toast-container { position: fixed; bottom: 2rem; right: 2rem; display: flex; flex-direction: column; gap: 1rem; z-index: 1000; }
        .toast { padding: 1rem 1.5rem; border-radius: var(--radius-md); background: white; box-shadow: var(--shadow-md); font-weight: 500; display: flex; gap: 0.75rem; transform: translateX(120%); opacity: 0; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--error); }
        
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); z-index: 2000; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; font-weight: 700; color: var(--primary); visibility: hidden; opacity: 0; transition: var(--transition); }
        #loading.active { visibility: visible; opacity: 1; }

        @media (max-width: 992px) { 
            .main-grid { grid-template-columns: 1fr; } 
            .results-panel { position: static; margin-top: 2rem; }
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .auth-card { padding: 2rem 1.5rem; }
            .app-header { flex-direction: column; text-align: center; gap: 1.5rem; padding: 1.5rem; }
            .app-header button { width: 100%; }
            .top-bar-app { flex-direction: column; align-items: stretch; gap: 1.5rem; }
            .top-bar-actions { flex-direction: column; width: 100%; }
            .top-bar-actions button { width: 100%; }
            .subjects-grid { grid-template-columns: 1fr; }
            .avg-value { font-size: 3rem; }
            #toast-container { right: 1rem; left: 1rem; bottom: 1rem; align-items: center; }
            .toast { width: 100%; justify-content: center; }
            .modal-row { grid-template-columns: 1fr; gap: 0.5rem; text-align: center; padding: 1rem; }
            .btn-icon { width: 100%; margin-top: 0.5rem; }
        }
    </style>
</head>
<body>

    <div id="loading">Veuillez patienter...</div>
    <div id="toast-container"></div>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>⚙️ Configurer les matières</h3>
                <button class="close-btn" onclick="closeSettings()">&times;</button>
            </div>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1.5rem;">Modifie les noms, les coefficients, ou ajoute de nouvelles matières.</p>
            
            <div id="settings-subjects-list"></div>
            
            <button class="btn-outline" style="margin-top: 1rem;" onclick="addNewSubjectRow()">+ Ajouter une matière</button>
            <button class="btn-primary" style="margin-top: 1.5rem;" onclick="saveSettings()">Appliquer les changements</button>
        </div>
    </div>

    <div id="auth-section" class="container auth-wrapper">
        <div class="auth-card">
            <h1>Massar Personnel</h1>
            <p>Connectez-vous pour accéder à vos résultats</p>
            <div class="auth-form">
                <div class="input-group"><label>Adresse e-mail</label><input type="email" id="auth-email" placeholder="eleve@ecole.com"></div>
                <div class="input-group"><label>Mot de passe</label><input type="password" id="auth-password" placeholder="••••••••"></div>
                <div class="auth-buttons"><button class="btn-primary" onclick="seConnecter()">Se connecter</button><button class="btn-outline" onclick="creerCompte()">Créer un compte</button></div>
                <div id="auth-message"></div>
            </div>
        </div>
    </div>

    <div id="app-section" class="container">
        <div class="app-header">
            <div class="user-info"><h2>Mon Bulletin</h2><p id="welcome-message">Bienvenue</p></div>
            <button class="btn-danger" onclick="seDeconnecter()">Déconnexion</button>
        </div>

        <div class="top-bar-app">
            <div class="input-group" style="flex:1; max-width: 100%;">
                <label>Nom complet de l'élève</label>
                <input type="text" id="nom_eleve" placeholder="Ex: Jean Dupont">
            </div>
            <div class="top-bar-actions">
                <button class="btn-outline" onclick="openSettings()">⚙️ Gérer les matières</button>
                <button class="btn-primary" onclick="sauvegarderNotes()">💾 Enregistrer</button>
            </div>
        </div>

        <div class="main-grid">
            <div>
                <div class="section-title">
                    Saisie des notes (0 à 20)
                    <button class="btn-outline" style="width: auto; padding: 0.4rem 1rem; font-size: 0.8rem;" onclick="effacerFormulaire()">Effacer tout</button>
                </div>
                <div class="subjects-grid" id="subjects-container"></div>
            </div>
            <div>
                <div class="results-panel">
                    <h2 class="section-title">Résultats en direct</h2>
                    <div class="general-avg-card">
                        <div class="avg-label">Moyenne Générale (Provisoire)</div>
                        <div class="avg-value" id="moyenne-generale">--</div>
                        <div class="appraisal-badge" id="appraisal-badge" style="display: none;"></div>
                    </div>
                    <div id="results-container" style="display: flex; flex-direction: column; gap: 0.5rem;"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const supabaseUrl = 'https://exnrseyyxzqjhlabtesu.supabase.co';
        const supabaseKey = 'sb_publishable_aAQhzHqknK1UKWRiLJur0w_E7jAXoDW';
        const supabase = createClient(supabaseUrl, supabaseKey);

        let currentUser = null;

        // Configuration par défaut (sera écrasée par celle de la DB si modifiée)
        let subjectsConfig = [
            { id: 'math', name: 'Mathématiques', coef: 5 },
            { id: 'francais', name: 'Français', coef: 5 },
            { id: 'arabe', name: 'Arabe', coef: 5 },
            { id: 'hg', name: 'Histoire-Géo', coef: 3 },
            { id: 'pc', name: 'Physique-Chimie', coef: 2 },
            { id: 'is', name: 'IS', coef: 2 },
            { id: 'anglais', name: 'Anglais', coef: 2 },
            { id: 'eps', name: 'EPS', coef: 1 },
            { id: 'informatique', name: 'Informatique', coef: 1 }
        ];

        // Format standard pour toutes les matières : 3 notes + 1 activité
        const standardInputs = ['note1', 'note2', 'note3', 'activite'];
        
        // Stockage en direct des notes
        let notesData = {}; 

        // --- UTILITAIRES ---
        function toggleLoading(show) { document.getElementById('loading').classList.toggle('active', show); }
        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3000);
        }
        function showAuthScreen() { document.getElementById('app-section').style.display = 'none'; document.getElementById('auth-section').style.display = 'flex'; }
        function showDashboard(email) { document.getElementById('auth-section').style.display = 'none'; document.getElementById('app-section').style.display = 'block'; document.getElementById('welcome-message').innerText = `Connecté en tant que : ${email}`; }
        function setAuthMessage(text, color) { const msgBox = document.getElementById('auth-message'); msgBox.innerText = text; msgBox.style.color = color; }
        function generateId() { return 'sub_' + Math.random().toString(36).substr(2, 9); }

        // --- AUTHENTIFICATION ---
        window.creerCompte = async function() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if (!email || !password) { setAuthMessage("⚠️ Remplis l'email et le mot de passe.", "red"); return; }
            setAuthMessage("⏳ Création...", "#D97706"); toggleLoading(true);
            const { data, error } = await supabase.auth.signUp({ email, password });
            toggleLoading(false);
            if (error) { setAuthMessage("❌ Erreur : " + error.message, "red"); } else { setAuthMessage("✅ Compte créé ! Connecte-toi.", "green"); }
        };

        window.seConnecter = async function() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if (!email || !password) { setAuthMessage("⚠️ Remplis l'email et le mot de passe.", "red"); return; }
            setAuthMessage("⏳ Connexion...", "#D97706"); toggleLoading(true);
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            toggleLoading(false);
            if (error) { setAuthMessage("❌ Identifiants incorrects.", "red"); }
        };

        window.seDeconnecter = async function() {
            toggleLoading(true); await supabase.auth.signOut(); toggleLoading(false);
            notesData = {}; window.effacerFormulaire(); document.getElementById('nom_eleve').value = ''; document.getElementById('auth-password').value = ''; setAuthMessage("", "black");
        };

        // --- GESTION DES MATIÈRES (MODAL) ---
        window.openSettings = function() {
            const list = document.getElementById('settings-subjects-list');
            list.innerHTML = '';
            subjectsConfig.forEach(sub => {
                list.insertAdjacentHTML('beforeend', `
                    <div class="modal-row" id="row_${sub.id}">
                        <input type="text" class="set-name" value="${sub.name}" placeholder="Nom de la matière">
                        <input type="number" class="set-coef" value="${sub.coef}" min="1" placeholder="Coef">
                        <button class="btn-icon" onclick="document.getElementById('row_${sub.id}').remove()">×</button>
                        <input type="hidden" class="set-id" value="${sub.id}">
                    </div>
                `);
            });
            document.getElementById('settings-modal').classList.add('active');
        };

        window.closeSettings = function() { document.getElementById('settings-modal').classList.remove('active'); };

        window.addNewSubjectRow = function() {
            const newId = generateId();
            document.getElementById('settings-subjects-list').insertAdjacentHTML('beforeend', `
                <div class="modal-row" id="row_${newId}">
                    <input type="text" class="set-name" value="Nouvelle Matière" placeholder="Nom de la matière">
                    <input type="number" class="set-coef" value="1" min="1" placeholder="Coef">
                    <button class="btn-icon" onclick="document.getElementById('row_${newId}').remove()">×</button>
                    <input type="hidden" class="set-id" value="${newId}">
                </div>
            `);
        };

        window.saveSettings = async function() {
            const rows = document.querySelectorAll('.modal-row');
            let newConfig = [];
            
            rows.forEach(row => {
                const id = row.querySelector('.set-id').value;
                const name = row.querySelector('.set-name').value.trim();
                const coef = parseFloat(row.querySelector('.set-coef').value) || 1;
                if(name) newConfig.push({ id, name, coef });
            });

            if(newConfig.length === 0) { alert("Il faut au moins une matière !"); return; }
            
            subjectsConfig = newConfig;
            closeSettings();
            
            // Sauvegarde immédiate de la structure dans Supabase
            if (currentUser) {
                toggleLoading(true);
                await supabase.from('notes_semestre').upsert({ 
                    user_id: currentUser.id, 
                    config_matieres: subjectsConfig 
                }, { onConflict: 'user_id' });
                toggleLoading(false);
            }
            
            initUI(); // Recharger l'affichage
            showToast("✅ Configuration mise à jour", "success");
        };

        // --- GESTION DE L'AFFICHAGE & CALCULS ---
        function initUI() {
            // Sauvegarder les notes actuelles tapées avant de redessiner
            document.querySelectorAll('input[type="number"][id*="_"]').forEach(input => {
                if(input.value) notesData[input.id] = parseFloat(input.value);
            });

            const container = document.getElementById('subjects-container');
            const resultsContainer = document.getElementById('results-container');
            container.innerHTML = ''; resultsContainer.innerHTML = '';
            
            subjectsConfig.forEach(sub => {
                const inputsHTML = standardInputs.map((inp, idx) => {
                    let labelText = (inp === 'activite') ? 'Activité' : `Note ${idx + 1}`;
                    const inputId = `${sub.id}_${inp}`;
                    const existingValue = notesData[inputId] !== undefined ? notesData[inputId] : '';
                    
                    return `
                    <div class="input-group">
                        <label style="font-size: 0.8rem; text-align: center;">${labelText}</label>
                        <input type="number" id="${inputId}" min="0" max="20" step="0.25" placeholder="-" inputmode="decimal" value="${existingValue}">
                    </div>
                    `;
                }).join('');

                container.innerHTML += `<div class="subject-card"><div class="subject-header"><h3>${sub.name}</h3><span class="coef-badge">Coef. ${sub.coef}</span></div><div class="notes-inputs">${inputsHTML}</div></div>`;
                resultsContainer.innerHTML += `<div class="result-row"><span>${sub.name}</span><span id="res_${sub.id}">--</span></div>`;
            });
            
            document.querySelectorAll('input[type="number"]').forEach(input => { input.addEventListener('input', runCalculations); });
            runCalculations();
        }

        function runCalculations() {
            let totalPoints = 0, totalCoefs = 0, allValid = true;
            notesData = {}; // Reset et maj avec le DOM actuel

            subjectsConfig.forEach(sub => {
                let sum = 0, count = 0;
                standardInputs.forEach(inp => {
                    const inputEl = document.getElementById(`${sub.id}_${inp}`);
                    if(!inputEl) return;
                    
                    const val = inputEl.value;
                    if (val !== "") {
                        const num = parseFloat(val);
                        if (num >= 0 && num <= 20) { 
                            sum += num; count++; 
                            notesData[`${sub.id}_${inp}`] = num;
                        } else { allValid = false; }
                    }
                });

                if (count > 0) {
                    const avg = sum / count;
                    document.getElementById(`res_${sub.id}`).innerText = avg.toFixed(2);
                    totalPoints += (avg * sub.coef);
                    totalCoefs += sub.coef;
                } else {
                    document.getElementById(`res_${sub.id}`).innerText = '--';
                }
            });

            const genAvgEl = document.getElementById('moyenne-generale');
            const badgeEl = document.getElementById('appraisal-badge');

            if (totalCoefs > 0) {
                const genAvg = totalPoints / totalCoefs;
                genAvgEl.innerText = genAvg.toFixed(2);
                badgeEl.style.display = 'inline-block';
                
                if (genAvg >= 16) { badgeEl.innerText = 'Excellent'; badgeEl.style.color = '#fff'; }
                else if (genAvg >= 14) { badgeEl.innerText = 'Très bien'; badgeEl.style.color = '#fff'; }
                else if (genAvg >= 12) { badgeEl.innerText = 'Bien'; badgeEl.style.color = '#fff'; }
                else if (genAvg >= 10) { badgeEl.innerText = 'Passable'; badgeEl.style.color = '#fff'; }
                else { badgeEl.innerText = 'Insuffisant'; badgeEl.style.color = '#FFD1D1'; }
                
                return { isValid: allValid, hasData: true };
            } else {
                genAvgEl.innerText = '--';
                badgeEl.style.display = 'none';
                return { isValid: allValid, hasData: false };
            }
        }

        window.effacerFormulaire = function() {
            document.querySelectorAll('.notes-inputs input').forEach(input => input.value = '');
            notesData = {};
            runCalculations();
        };

        window.sauvegarderNotes = async function() {
            if (!currentUser) return;

            const nom_eleve = document.getElementById('nom_eleve').value.trim();
            if(!nom_eleve) { alert("Veuillez entrer le nom de l'élève en haut."); return; }

            const calc = runCalculations();
            if (!calc.isValid) { alert("Les notes saisies doivent être entre 0 et 20."); return; }

            toggleLoading(true);
            try {
                // On sauvegarde le config + le dict des notes en JSON
                const payload = { 
                    user_id: currentUser.id, 
                    nom_eleve: nom_eleve,
                    config_matieres: subjectsConfig,
                    notes_valeurs: notesData
                };
                
                const { error } = await supabase.from('notes_semestre').upsert(payload, { onConflict: 'user_id' });
                if (error) throw error;
                showToast("✅ Bulletin sauvegardé !", "success");
            } catch (err) {
                alert("Erreur : " + err.message);
            } finally {
                toggleLoading(false);
            }
        };

        async function loadUserData() {
            if(!currentUser) return;
            toggleLoading(true);
            try {
                const { data, error } = await supabase.from('notes_semestre').select('*').eq('user_id', currentUser.id).single();
                if (error && error.code !== 'PGRST116') throw error;
                
                if (data) {
                    if(data.nom_eleve) document.getElementById('nom_eleve').value = data.nom_eleve;
                    
                    // Récupérer la config personnalisée si elle existe
                    if(data.config_matieres && data.config_matieres.length > 0) {
                        subjectsConfig = data.config_matieres;
                    }

                    // Récupérer les notes depuis le JSON
                    if(data.notes_valeurs) {
                        notesData = data.notes_valeurs;
                    }
                    
                    initUI(); // Dessiner avec les bonnes data
                } else {
                    initUI(); // Nv user
                }
            } catch (err) {
                console.error("Erreur de chargement :", err);
                initUI();
            } finally {
                toggleLoading(false);
            }
        }

        supabase.auth.onAuthStateChange((event, session) => {
            if (session && session.user) {
                currentUser = session.user;
                showDashboard(currentUser.email);
                loadUserData();
            } else {
                currentUser = null;
                showAuthScreen();
            }
        });

    </script>
</body>
</html>
