<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Massar</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: sans-serif; background-color: #F5F3ED; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-primary { background-color: #4A5D4E; color: white; }
        .btn-outline { background-color: transparent; border: 2px solid #4A5D4E; color: #4A5D4E; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>Espace Élève</h2>
        
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="eleve@ecole.com">
        </div>
        <div class="input-group">
            <label>Mot de passe</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <button class="btn-primary" onclick="seConnecter()">Se connecter</button>
        <button class="btn-outline" onclick="creerCompte()">Créer un compte</button>
    </div>

    <script>
        // 1. Connexion à ta base de données Supabase
        const supabaseUrl = 'https://exnrseyyxzqjhlabtesu.supabase.co';
        const supabaseKey = 'sb_publishable_aAQhzHqknK1UKWRiLJur0w_E7jAXoDW';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // 2. Fonction pour créer un compte
        async function creerCompte() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert("Veuillez remplir l'email et le mot de passe.");
                return;
            }

            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
            });

            if (error) {
                alert("Erreur Supabase (Création) : " + error.message);
            } else {
                alert("Compte créé avec succès ! Tu peux maintenant te connecter.");
            }
        }

        // 3. Fonction pour se connecter
        async function seConnecter() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert("Veuillez remplir l'email et le mot de passe.");
                return;
            }

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert("Erreur Supabase (Connexion) : " + error.message);
            } else {
                alert("Connexion réussie ! Bienvenue " + data.user.email);
            }
        }
    </script>
</body>
</html>
