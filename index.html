<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Massar Personnel - Test</title>
    
    <style>
        /* Styles de base pour que ça soit joli */
        body {
            font-family: sans-serif;
            background-color: #F5F3ED;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-card {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-primary { background-color: #4A5D4E; color: white; }
        .btn-outline { background-color: transparent; border: 2px solid #4A5D4E; color: #4A5D4E; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h1>Étape 1</h1>
        <p>Test des boutons</p>
        
        <div class="input-group">
            <label>Adresse e-mail</label>
            <input type="email" id="auth-email" placeholder="test@ecole.com">
        </div>
        <div class="input-group">
            <label>Mot de passe</label>
            <input type="password" id="auth-password" placeholder="••••••••">
        </div>
        
        <button class="btn-primary" onclick="testConnexion()">Se connecter</button>
        <button class="btn-outline" onclick="testInscription()">Créer un compte</button>
    </div>

    <script>
        // Fonction très simple pour tester le bouton "Se connecter"
        function testConnexion() {
            const email = document.getElementById('auth-email').value;
            alert("✅ Le bouton SE CONNECTER marche !\nEmail tapé : " + email);
        }

        // Fonction très simple pour tester le bouton "Créer un compte"
        function testInscription() {
            const email = document.getElementById('auth-email').value;
            alert("✅ Le bouton CRÉER UN COMPTE marche !\nEmail tapé : " + email);
        }
    </script>

</body>
</html>
